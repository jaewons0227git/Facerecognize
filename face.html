<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>정밀 안면 인식 시스템</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        body {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0; background-color: #f4f6f9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow: hidden;
            cursor: pointer;
        }

        .main-wrapper {
            display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%;
            transition: all 0.3s ease;
        }
        .camera-container {
            position: relative; width: 90vw; max-width: 420px; height: 65vh; max-height: 550px;
            border-radius: 30px; overflow: hidden; background: #000;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); }
        
        #status {
            margin-top: 24px; padding: 16px 32px; background: white; border-radius: 50px;
            font-size: 16px; font-weight: 700; color: #1c1e21; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.08); transition: all 0.3s ease;
            text-align: center;
        }

        #successScreen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(135deg, #ffffff 0%, #f0f4f8 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; opacity: 0; visibility: hidden; transition: opacity 0.5s ease;
        }
        #successScreen.active {
            opacity: 1; visibility: visible;
        }
        .success-content {
            text-align: center; transform: translateY(40px) scale(0.95); opacity: 0;
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s;
        }
        #successScreen.active .success-content {
            transform: translateY(0) scale(1); opacity: 1;
        }

        .welcome-title { margin: 0 0 16px 0; font-size: 28px; font-weight: 800; color: #1c1e21; }
        .info-label { font-size: 14px; color: #9ca3af; margin-bottom: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        .info-text { font-size: 18px; color: #374151; font-weight: 600; margin-bottom: 8px; }
    </style>
</head>
<body>

    <div class="main-wrapper" id="cameraContainer">
        <div class="camera-container">
            <video id="video" autoplay muted playsinline></video>
            <canvas id="overlay"></canvas>
        </div>
        <div id="status">시스템 준비 중...</div>
    </div>

    <div id="successScreen">
        <div class="success-content">
            <img src="https://cdn-icons-png.flaticon.com/512/5494/5494997.png" width="130" style="margin-bottom: 24px; filter: drop-shadow(0 12px 24px rgba(0,122,255,0.25));">
            <h2 id="welcomeName" class="welcome-title">이름님 환영합니다</h2>
            <div class="info-label">회원정보</div>
            <div id="infoName" class="info-text">이름: </div>
            <div id="infoBirth" class="info-text">생년월일: </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('overlay');
        const statusText = document.getElementById('status');
        const cameraContainer = document.getElementById('cameraContainer');
        const successScreen = document.getElementById('successScreen');

        let lastNosePos = { x: 0, y: 0 };
        let lastBoxWidth = 0;
        let score = 0;
        let isVerified = false;
        let isRequesting = false;
        
        let capturedFrames = [];
        let earlyCaptured = false;
        let backendPromise = null;
        let isBackendWoken = false; 
        
        let isAbnormal = false;
        let abnormalTimer = null;

        document.body.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch((err) => {
                    console.log(`전체화면 전환 오류: ${err.message}`);
                });
            }
        });

        async function init() {
            const MODEL_URL = 'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights';
            await Promise.all([
                faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL)
            ]);
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                video.play();
                detect();
            };
        }

        function drawBox(ctx, x, y, w, h, radius, color) {
            ctx.strokeStyle = color;
            ctx.lineWidth = 5;
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + w - radius, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + radius);
            ctx.lineTo(x + w, y + h - radius);
            ctx.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
            ctx.lineTo(x + radius, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - radius);
            ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y);
            ctx.stroke();
        }

        async function detect() {
            const displaySize = { width: video.offsetWidth, height: video.offsetHeight };
            faceapi.matchDimensions(canvas, displaySize);

            setInterval(async () => {
                if (isRequesting) return;

                const results = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 224 }))
                    .withFaceLandmarks();
                
                if (isRequesting) return; 

                const resized = faceapi.resizeResults(results, displaySize);
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                if (resized.length > 0) {
                    if (!isBackendWoken) {
                        isBackendWoken = true;
                        fetch('https://jaewondev2.pythonanywhere.com/wakeup').catch(()=>{});
                    }

                    resized.sort((a, b) => {
                        return (b.detection.box.width * b.detection.box.height) - (a.detection.box.width * a.detection.box.height);
                    });

                    const det = resized[0];
                    const box = det.detection.box;
                    const nose = det.landmarks.getNose()[3];

                    const adjW = box.width * 1.45; 
                    const adjH = box.height * 1.25; 
                    const adjX = box.x - (adjW - box.width) / 2;
                    const adjY = box.y - (adjH * 0.25);

                    const moveDist = Math.hypot(nose.x - lastNosePos.x, nose.y - lastNosePos.y);
                    const sizeDiff = Math.abs(box.width - lastBoxWidth);

                    if (moveDist > 0.5 && moveDist < 8 && sizeDiff < 3) {
                        score++;
                        
                        // [수정됨] 정확성을 위해 원본 해상도 그대로 캡처 (화질 저하 없음)
                        if ([1, 3, 5].includes(score) && capturedFrames.length < 3) {
                            const tempCanvas = document.createElement('canvas');
                            tempCanvas.width = video.videoWidth; 
                            tempCanvas.height = video.videoHeight;
                            const tCtx = tempCanvas.getContext('2d');
                            tCtx.translate(tempCanvas.width, 0); 
                            tCtx.scale(-1, 1); 
                            tCtx.drawImage(video, 0, 0);
                            
                            // 0.9 품질의 원본 사이즈 JPEG로 인코딩 (Base64 숫자/문자열 형태로 변환됨)
                            capturedFrames.push(tempCanvas.toDataURL('image/jpeg', 0.9)); 
                        }

                        if (score === 5 && !earlyCaptured) {
                            earlyCaptured = true;
                            backendPromise = fetch('https://jaewondev2.pythonanywhere.com/recognize', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ images: capturedFrames })
                            }).then(res => res.json()).catch(err => ({success: false, error: true}));
                        }

                    } else if (moveDist >= 8 || sizeDiff >= 3) {
                        score = Math.max(0, score - 5);
                        capturedFrames = []; earlyCaptured = false; backendPromise = null;
                        
                        isAbnormal = true; 
                        statusText.innerText = "비정상적 움직임 감지! 고정해주세요.";
                        statusText.style.color = "#FF3B30";
                        
                        clearTimeout(abnormalTimer);
                        abnormalTimer = setTimeout(() => { isAbnormal = false; }, 1000); 
                    }

                    if (score > 8) isVerified = true;

                    if (isVerified && !isRequesting) {
                        isRequesting = true; 
                        statusText.innerText = "실제 인물 확인됨. 최종 보안 검증 중...";
                        statusText.style.color = "#007AFF";
                        drawBox(ctx, adjX, adjY, adjW, adjH, 25, '#007AFF');

                        if (backendPromise) {
                            backendPromise.then(data => {
                                if (data.success) {
                                    document.getElementById('welcomeName').innerText = `${data.name}님 환영합니다`;
                                    document.getElementById('infoName').innerText = `이름: ${data.name}`;
                                    document.getElementById('infoBirth').innerText = `생년월일: ${data.birthdate}`;
                                    successScreen.classList.add('active');
                                } else {
                                    statusText.innerText = data.message || "보안 검증 실패: 미등록자이거나 가로채기 감지됨.";
                                    statusText.style.color = "#FF3B30";
                                    setTimeout(() => { 
                                        isVerified = false; score = 0; isRequesting = false; 
                                        capturedFrames = []; earlyCaptured = false; backendPromise = null;
                                        statusText.style.color = "#1c1e21"; 
                                    }, 2000);
                                }
                            });
                        }
                    } else if (!isVerified && !isAbnormal) {
                        statusText.innerText = "사용자 분석 중 (정면을 응시하세요)";
                        statusText.style.color = "#1c1e21";
                        drawBox(ctx, adjX, adjY, adjW, adjH, 25, '#ccc');
                    } else if (isAbnormal) {
                        drawBox(ctx, adjX, adjY, adjW, adjH, 25, '#FF3B30');
                    }

                    lastNosePos = { x: nose.x, y: nose.y };
                    lastBoxWidth = box.width;
                } else {
                    score = 0;
                    isVerified = false;
                    capturedFrames = []; earlyCaptured = false; backendPromise = null;
                    if (!isAbnormal) {
                        statusText.innerText = "얼굴이 감지되지 않습니다.";
                        statusText.style.color = "#1c1e21";
                    }
                }
            }, 50);
        }

        init();
    </script>
</body>
</html>
