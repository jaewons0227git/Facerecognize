<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>정밀 안면 인식 시스템</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        body {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0; background-color: #f4f6f9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow: hidden;
            cursor: pointer;
        }

        .main-wrapper {
            display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%;
            transition: all 0.3s ease;
        }
        /* PC/크롬북 호환성을 위한 16:9 비율 설정 */
        .camera-container {
            position: relative; width: 90vw; max-width: 960px; aspect-ratio: 16 / 9;
            border-radius: 20px; overflow: hidden; background: #000;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); }
        
        .spinner-inline {
            width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%; border-top-color: #fff;
            animation: spin 1s linear infinite; display: inline-block; vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        #status {
            margin-top: 24px; padding: 12px 24px; background: white; border-radius: 50px;
            font-size: 15px; font-weight: 700; color: #1c1e21; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        /* 기존 successScreen은 기능 유지를 위해 숨김 처리만 함 */
        #successScreen { display: none; }
    </style>
</head>
<body>

    <div class="main-wrapper" id="cameraContainer">
        <div class="camera-container">
            <video id="video" autoplay muted playsinline></video>
            <canvas id="overlay"></canvas>
        </div>
        <div id="status">모델 로딩 중...</div>
    </div>

    <div id="successScreen"></div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('overlay');
        const statusText = document.getElementById('status');
        
        // 실시간 인식 상태 저장용
        let recognitionResults = {}; 

        async function init() {
            try {
                const MODEL_URL = 'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights';
                statusText.innerText = "AI 모델 불러오는 중...";
                // 호환성을 위해 모델 먼저 로드
                await Promise.all([
                    faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                    faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL)
                ]);
                
                statusText.innerText = "카메라 권한 요청 중...";
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: 'user',
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    } 
                });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    video.play();
                    statusText.innerText = "시스템 작동 중";
                    detect();
                };
            } catch (err) {
                statusText.innerText = "오류: " + err.message;
            }
        }

        // 라벨이 붙은 박스 그리기 함수
        function drawFaceBox(ctx, x, y, w, h, name, isAnalyzing) {
            const color = isAnalyzing ? '#FFD700' : '#007AFF'; // 분석중 노란색, 완료 파란색
            
            // 테두리
            ctx.strokeStyle = color;
            ctx.lineWidth = 4;
            ctx.strokeRect(x, y, w, h);

            // 상단 이름표 사각형 (평평한 직선 부분에 부착)
            const labelHeight = 30;
            ctx.fillStyle = color;
            ctx.fillRect(x - 2, y - labelHeight, w + 4, labelHeight);

            // 텍스트/로딩 표시
            ctx.fillStyle = "white";
            ctx.font = "bold 14px sans-serif";
            ctx.textAlign = "center";
            if (isAnalyzing) {
                ctx.fillText("분석 중...", x + (w / 2), y - 10);
            } else {
                ctx.fillText(name, x + (w / 2), y - 10);
            }
        }

        async function detect() {
            const displaySize = { width: video.offsetWidth, height: video.offsetHeight };
            faceapi.matchDimensions(canvas, displaySize);

            setInterval(async () => {
                const results = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 224 }))
                    .withFaceLandmarks();
                
                const resized = faceapi.resizeResults(results, displaySize);
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                resized.forEach((det, index) => {
                    const box = det.detection.box;
                    const faceId = `face_${index}`; // 간단한 인덱스 기반 ID

                    // 서버에 분석 요청 (결과가 없을 때만)
                    if (!recognitionResults[faceId]) {
                        recognitionResults[faceId] = { name: "분석 중", status: "analyzing" };
                        
                        const tempCanvas = document.createElement('canvas');
                        tempCanvas.width = video.videoWidth;
                        tempCanvas.height = video.videoHeight;
                        const tCtx = tempCanvas.getContext('2d');
                        tCtx.drawImage(video, 0, 0);
                        const frameData = tempCanvas.toDataURL('image/jpeg', 0.8);

                        fetch('https://jaewondev2.pythonanywhere.com/recognize', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ images: [frameData] })
                        })
                        .then(res => res.json())
                        .then(data => {
                            if (data.success) {
                                recognitionResults[faceId] = { name: data.name, status: "complete" };
                            } else {
                                recognitionResults[faceId] = { name: "미등록자", status: "complete" };
                            }
                        })
                        .catch(() => {
                            recognitionResults[faceId] = null; // 실패 시 재시도 가능하게
                        });
                    }

                    const isAnalyzing = recognitionResults[faceId].status === "analyzing";
                    drawFaceBox(ctx, box.x, box.y, box.width, box.height, recognitionResults[faceId].name, isAnalyzing);
                });

                // 얼굴이 사라지면 데이터 초기화 (간단한 구현)
                if (resized.length === 0) recognitionResults = {};

            }, 200);
        }

        init();
    </script>
</body>
</html>
