<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>정밀 안면 인식 시스템</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        body {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0; background-color: #f4f6f9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow: hidden;
        }

        .main-wrapper {
            display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%;
            transition: all 0.3s ease;
        }
        
        .camera-container {
            position: relative; width: 90vw; max-width: 420px; height: 65vh; max-height: 550px;
            border-radius: 30px; overflow: hidden; background: #000;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            transition: background-color 0.3s ease;
        }

        /* PC 환경 접속 시 카메라 비율을 16:9로 강제 유지 */
        @media (min-width: 768px) {
            .camera-container {
                max-width: 800px;
                height: auto;
                aspect-ratio: 16 / 9;
                max-height: none;
            }
        }

        /* 캔버스와 비디오를 완벽하게 포개어 외곽선 비율 왜곡 현상 영구 방지 */
        video, canvas { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            object-fit: cover; transform: scaleX(-1); transition: opacity 0.3s ease; 
        }
        
        #status-container {
            margin-top: 24px; display: flex; align-items: center; justify-content: center; gap: 12px;
        }

        #status {
            padding: 16px 32px; background: white; border-radius: 50px;
            font-size: 16px; font-weight: 700; color: #1c1e21; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.08); transition: all 0.3s ease;
            text-align: center;
        }

        #fullscreen-btn {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            padding: 14px 20px; background: #007AFF; color: white; border: none; border-radius: 50px;
            font-size: 15px; font-weight: 700; cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,122,255,0.3); transition: all 0.2s ease;
        }
        #fullscreen-btn:active { transform: scale(0.95); }
        #fullscreen-btn svg { width: 18px; height: 18px; fill: white; }
    </style>
</head>
<body>

    <div class="main-wrapper" id="cameraContainer">
        <div class="camera-container">
            <video id="video" autoplay muted playsinline></video>
            <canvas id="overlay"></canvas>
        </div>
        <div id="status-container">
            <div id="status">시스템 준비 중...</div>
            <button id="fullscreen-btn" style="display: none;">
                <svg viewBox="0 0 24 24"><path d="M5 5h5V3H3v7h2zm5 14H5v-5H3v7h7zm11-5h-2v5h-5v2h7zm-2-9V5h-5V3h7v7z"/></svg>
                전체화면
            </button>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('overlay');
        const statusText = document.getElementById('status');
        const fullscreenBtn = document.getElementById('fullscreen-btn');
        const cameraContainer = document.querySelector('.camera-container');
        
        let isBackendWoken = false; 
        let activeFaces = []; 
        let faceIdCounter = 0;

        // 전체화면 버튼 클릭 이벤트 (카메라 영역만 전체화면으로 만들어 하단 UI 자동 숨김)
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                cameraContainer.requestFullscreen().catch(err => {
                    alert(`전체화면 전환 오류: ${err.message}`);
                });
            }
        });

        async function init() {
            try {
                statusText.innerText = "AI 모델 로딩 중...";
                const MODEL_URL = 'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights';
                // 저사양 최적화를 위해 무거운 faceLandmark68Net을 제거하고 경량 모델만 로드
                await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
                
                statusText.innerText = "카메라 권한 요청 중...";
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    // 비디오 원본 해상도에 맞춰 캔버스 내부 해상도를 동기화하여 박스 찌그러짐 원천 차단
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    video.play();
                    statusText.innerText = "다중 안면 인식 시스템 동작 중";
                    fullscreenBtn.style.display = 'flex';
                    requestAnimationFrame(drawLoop); 
                    detect(); 
                };
            } catch (err) {
                statusText.innerText = "오류: " + err.message;
                console.error(err);
            }
        }

        // 라벨 박스 위쪽 모서리만 둥글게 그리는 함수
        function drawTopRoundedRect(ctx, x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h);
            ctx.lineTo(x, y + h);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.fill();
        }

        function drawBox(ctx, x, y, w, h, radius, color, text, isLoading) {
            ctx.strokeStyle = color;
            ctx.lineWidth = 5;
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + w - radius, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + radius);
            ctx.lineTo(x + w, y + h - radius);
            ctx.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
            ctx.lineTo(x + radius, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - radius);
            ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y);
            ctx.stroke();

            const labelW = Math.max(140, w * 0.6);
            const labelH = 40;
            const labelX = x + (w - labelW) / 2;
            const labelY = y - labelH;

            ctx.fillStyle = color;
            drawTopRoundedRect(ctx, labelX, labelY, labelW, labelH, 10);

            ctx.save();
            ctx.scale(-1, 1);
            const mirroredX = -(labelX + labelW);
            const centerX = mirroredX + labelW / 2;
            const centerY = labelY + labelH / 2;

            if (isLoading) {
                const time = Date.now();
                const angle = (time % 1500) / 1500 * Math.PI * 2;
                const dashOffset = Math.sin(time / 300) * Math.PI * 0.5;
                ctx.beginPath();
                ctx.arc(centerX, centerY, 12, angle, angle + Math.PI + Math.max(0.1, dashOffset));
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 4;
                ctx.lineCap = 'round';
                ctx.stroke();
            } else {
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 18px -apple-system, sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(text, centerX, centerY + 2);
            }
            ctx.restore();
        }

        function captureCroppedFace(videoElement, box) {
            // [유지됨] 백엔드 전송 시에는 얼굴 전체가 다 들어가도록 40% 여유 공간(padding) 유지
            const pad = box.width * 0.4;
            const fullCanvas = document.createElement('canvas');
            fullCanvas.width = videoElement.videoWidth;
            fullCanvas.height = videoElement.videoHeight;
            const fCtx = fullCanvas.getContext('2d');
            
            fCtx.translate(fullCanvas.width, 0);
            fCtx.scale(-1, 1);
            fCtx.drawImage(videoElement, 0, 0);

            const mirroredX = fullCanvas.width - box.x - box.width;
            const msx = Math.max(0, mirroredX - pad);
            const msy = Math.max(0, box.y - pad);
            const msw = Math.min(fullCanvas.width - msx, box.width + pad * 2);
            const msh = Math.min(fullCanvas.height - msy, box.height + pad * 2);

            const cropCanvas = document.createElement('canvas');
            cropCanvas.width = msw;
            cropCanvas.height = msh;
            const cCtx = cropCanvas.getContext('2d');
            cCtx.drawImage(fullCanvas, msx, msy, msw, msh, 0, 0, msw, msh);

            return cropCanvas.toDataURL('image/jpeg', 0.8);
        }

        function drawLoop() {
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (const face of activeFaces) {
                const box = face.box;
                // [수정됨] 렌더링되는 외곽선을 얼굴 크기에 딱 맞게 대폭 축소 (기존 1.45배 -> 1.05배)
                const adjW = box.width * 1.05; 
                const adjH = box.height * 1.15; 
                const adjX = box.x - (adjW - box.width) / 2;
                const adjY = box.y - (adjH - box.height) / 2;

                let color = '#ccc';
                let isLoading = false;
                let text = face.name;

                if (face.status === 'analyzing' || face.status === 'fetching') {
                    color = '#FFCC00'; 
                    isLoading = true;
                } else if (face.status === 'verified') {
                    color = '#007AFF'; 
                    // 백그라운드 확인 중이어도 로딩을 띄우지 않고 상태 유지
                } else if (face.status === 'failed') {
                    color = '#FF3B30'; 
                }

                drawBox(ctx, adjX, adjY, adjW, adjH, 25, color, text, isLoading);
            }

            requestAnimationFrame(drawLoop);
        }

        async function detect() {
            const displaySize = { width: video.videoWidth, height: video.videoHeight };
            faceapi.matchDimensions(canvas, displaySize);

            setInterval(async () => {
                const results = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 160 }));
                const resized = faceapi.resizeResults(results, displaySize);
                
                if (resized.length > 0 && !isBackendWoken) {
                    isBackendWoken = true;
                    fetch('https://jaewondev2.pythonanywhere.com/wakeup').catch(()=>{});
                }

                const currentBoxes = resized.map(det => det.box);
                const updatedFaces = [];
                const now = Date.now();

                for (const box of currentBoxes) {
                    let matchedFace = null;
                    let minDist = Infinity;

                    for (const face of activeFaces) {
                        const dx = face.box.x - box.x;
                        const dy = face.box.y - box.y;
                        const dist = Math.sqrt(dx*dx + dy*dy);
                        if (dist < box.width) { 
                            if (dist < minDist) { minDist = dist; matchedFace = face; }
                        }
                    }

                    if (matchedFace) {
                        matchedFace.box = box;
                        matchedFace.lastUpdate = now;
                        updatedFaces.push(matchedFace);
                        activeFaces = activeFaces.filter(f => f !== matchedFace);
                        
                        // 이름이 뜬 상태(verified)여도 뒤에서 몰래 계속 캡처함
                        if (matchedFace.status === 'analyzing' || matchedFace.status === 'verified') {
                            if (!matchedFace.isFetchingBackground) {
                                matchedFace.frames.push(captureCroppedFace(video, box));
                                if (matchedFace.frames.length >= 3) {
                                    if (matchedFace.status === 'analyzing') {
                                        matchedFace.status = 'fetching'; 
                                    } else {
                                        matchedFace.isFetchingBackground = true; 
                                    }
                                    requestAnalysis(matchedFace);
                                }
                            }
                        }
                    } else {
                        const newFace = {
                            id: faceIdCounter++,
                            box: box,
                            status: 'analyzing',
                            name: '',
                            frames: [captureCroppedFace(video, box)],
                            lastUpdate: now,
                            isFetchingBackground: false
                        };
                        updatedFaces.push(newFace);
                    }
                }

                for (const face of activeFaces) {
                    if (now - face.lastUpdate < 500) {
                        updatedFaces.push(face);
                    }
                }

                activeFaces = updatedFaces;

            }, 200);
        }

        function requestAnalysis(face) {
            fetch('https://jaewondev2.pythonanywhere.com/recognize', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ images: face.frames })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    face.status = 'verified';
                    face.name = data.name;
                } else {
                    face.status = 'failed';
                    face.name = '미등록/오류';
                    setTimeout(() => { if(face.status === 'failed') face.status = 'analyzing'; }, 2000);
                }
            })
            .catch(err => {
                face.status = 'failed';
                face.name = '서버 오류';
                setTimeout(() => { if(face.status === 'failed') face.status = 'analyzing'; }, 2000);
            })
            .finally(() => {
                face.frames = [];
                face.isFetchingBackground = false; 
            });
        }

        init();
    </script>
</body>
</html>
