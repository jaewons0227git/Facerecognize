<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>정밀 안면 인식 시스템</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        body {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0; background-color: #f4f6f9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow: hidden;
            cursor: pointer; /* 클릭 유도를 위한 커서 */
        }

        /* 메인 카메라 영역 */
        .main-wrapper {
            display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%;
            transition: all 0.3s ease;
        }
        .camera-container {
            position: relative; width: 90vw; max-width: 420px; height: 65vh; max-height: 550px;
            border-radius: 30px; overflow: hidden; background: #000;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); }
        
        /* 모던 상태 표시줄 */
        #status {
            margin-top: 24px; padding: 16px 32px; background: white; border-radius: 50px;
            font-size: 16px; font-weight: 700; color: #1c1e21; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.08); transition: all 0.3s ease;
            text-align: center;
        }

        /* 모던 모달 (결과 화면) */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(8px);
            display: flex; align-items: center; justify-content: center; z-index: 100;
            opacity: 0; visibility: hidden; transition: opacity 0.4s ease;
        }
        .modal-overlay.active {
            opacity: 1; visibility: visible;
        }
        .modal-content {
            background: white; width: 85vw; max-width: 340px; padding: 40px 24px;
            border-radius: 28px; box-shadow: 0 24px 48px rgba(0,0,0,0.2);
            text-align: center; 
            transform: scale(0.8) translateY(30px); opacity: 0; 
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); /* 역동적인 팝업 애니메이션 */
        }
        .modal-overlay.active .modal-content {
            transform: scale(1) translateY(0); opacity: 1;
        }

        .welcome-title { margin: 0 0 16px 0; font-size: 22px; font-weight: 800; color: #1c1e21; }
        .info-label { font-size: 13px; color: #9ca3af; margin-bottom: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        .info-text { font-size: 16px; color: #374151; font-weight: 600; margin-bottom: 6px; }
    </style>
</head>
<body>

    <div class="main-wrapper" id="cameraContainer">
        <div class="camera-container">
            <video id="video" autoplay muted playsinline></video>
            <canvas id="overlay"></canvas>
        </div>
        <div id="status">시스템 준비 중...</div>
    </div>

    <div id="successScreen" class="modal-overlay">
        <div class="modal-content">
            <img src="https://cdn-icons-png.flaticon.com/512/5494/5494997.png" width="110" style="margin-bottom: 24px; filter: drop-shadow(0 8px 16px rgba(0,122,255,0.2));">
            <h2 id="welcomeName" class="welcome-title">이름님 환영합니다</h2>
            <div class="info-label">회원정보</div>
            <div id="infoName" class="info-text">이름: </div>
            <div id="infoBirth" class="info-text">생년월일: </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('overlay');
        const statusText = document.getElementById('status');
        const cameraContainer = document.getElementById('cameraContainer');
        const successScreen = document.getElementById('successScreen');

        let lastNosePos = { x: 0, y: 0 };
        let lastBoxWidth = 0;
        let score = 0;
        let isVerified = false;
        let isRequesting = false;

        // 화면 클릭 시 전체화면 기능
        document.body.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch((err) => {
                    console.log(`전체화면 전환 오류: ${err.message}`);
                });
            }
        });

        async function init() {
            const MODEL_URL = 'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights';
            await Promise.all([
                faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL)
            ]);
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                video.play();
                detect();
            };
        }

        function drawBox(ctx, x, y, w, h, radius, color) {
            ctx.strokeStyle = color;
            ctx.lineWidth = 5;
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + w - radius, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + radius);
            ctx.lineTo(x + w, y + h - radius);
            ctx.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
            ctx.lineTo(x + radius, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - radius);
            ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y);
            ctx.stroke();
        }

        async function detect() {
            const displaySize = { width: video.offsetWidth, height: video.offsetHeight };
            faceapi.matchDimensions(canvas, displaySize);

            setInterval(async () => {
                if (isRequesting) return; // 서버 요청 중이면 감지 일시중지

                const results = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 224 }))
                    .withFaceLandmarks();
                const resized = faceapi.resizeResults(results, displaySize);
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                if (resized.length > 0) {
                    const det = resized[0];
                    const box = det.detection.box;
                    const nose = det.landmarks.getNose()[3];

                    // 1. 박스 비율 조정
                    const adjW = box.width * 1.45; 
                    const adjH = box.height * 1.25; 
                    const adjX = box.x - (adjW - box.width) / 2;
                    const adjY = box.y - (adjH * 0.25);

                    // 2. 가짜 흔들기 차단 로직 (Anti-Spoofing)
                    const moveDist = Math.hypot(nose.x - lastNosePos.x, nose.y - lastNosePos.y);
                    const sizeDiff = Math.abs(box.width - lastBoxWidth);

                    if (moveDist > 0.5 && moveDist < 8 && sizeDiff < 3) {
                        score++;
                    } else if (moveDist >= 8 || sizeDiff >= 3) {
                        score = Math.max(0, score - 5);
                        statusText.innerText = "비정상적 움직임 감지! 고정해주세요.";
                        statusText.style.color = "#FF3B30";
                    }

                    // 판별 시간 대폭 단축 (20 -> 8로 변경하여 약 0.4초만에 사람인지 인식)
                    if (score > 8) isVerified = true;

                    // 상태 업데이트 및 서버 전송 로직
                    if (isVerified && !isRequesting) {
                        isRequesting = true;
                        statusText.innerText = "실제 인물 확인됨. 서버에서 신원 분석 중...";
                        statusText.style.color = "#007AFF";
                        drawBox(ctx, adjX, adjY, adjW, adjH, 25, '#007AFF');

                        // 사진 캡처 (좌우 반전 처리)
                        const tempCanvas = document.createElement('canvas');
                        tempCanvas.width = video.videoWidth;
                        tempCanvas.height = video.videoHeight;
                        const tCtx = tempCanvas.getContext('2d');
                        tCtx.translate(tempCanvas.width, 0);
                        tCtx.scale(-1, 1);
                        tCtx.drawImage(video, 0, 0);
                        const imgData = tempCanvas.toDataURL('image/jpeg');

                        // 백엔드 요청
                        fetch('https://jaewondev2.pythonanywhere.com/recognize', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ image: imgData })
                        })
                        .then(res => res.json())
                        .then(data => {
                            if (data.success) {
                                // 인증 성공 시 부드럽고 역동적인 애니메이션 호출
                                document.getElementById('welcomeName').innerText = `${data.name}님 환영합니다`;
                                document.getElementById('infoName').innerText = `이름: ${data.name}`;
                                document.getElementById('infoBirth').innerText = `생년월일: ${data.birthdate}`;
                                
                                successScreen.classList.add('active'); // 모달 활성화
                            } else {
                                statusText.innerText = "등록되지 않은 사용자거나 일치하지 않습니다.";
                                statusText.style.color = "#FF3B30";
                                setTimeout(() => { isVerified = false; score = 0; isRequesting = false; statusText.style.color = "#1c1e21"; }, 2000);
                            }
                        })
                        .catch(err => {
                            statusText.innerText = "서버 연결 오류가 발생했습니다.";
                            statusText.style.color = "#FF3B30";
                            setTimeout(() => { isVerified = false; score = 0; isRequesting = false; statusText.style.color = "#1c1e21"; }, 2000);
                        });

                    } else if (!isVerified) {
                        statusText.innerText = "사용자 분석 중 (정면을 응시하세요)";
                        statusText.style.color = "#1c1e21";
                        drawBox(ctx, adjX, adjY, adjW, adjH, 25, '#ccc');
                    }

                    lastNosePos = { x: nose.x, y: nose.y };
                    lastBoxWidth = box.width;
                } else {
                    score = 0;
                    isVerified = false;
                    statusText.innerText = "얼굴이 감지되지 않습니다.";
                    statusText.style.color = "#1c1e21";
                }
            }, 50);
        }

        init();
    </script>
</body>
</html>
